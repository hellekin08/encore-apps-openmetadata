apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openmetadata
  namespace: cx-fluxed-openmetadata-encore-ns
spec:
  interval: 1m
  path: ./openmetadata/app/overlays/dev
  prune: true
  serviceAccountName: default-login-serviceaccount
  sourceRef:
    kind: GitRepository
    name: encore-infrastructure
  decryption:
    provider: sops
  wait: true
  timeout: 15m
