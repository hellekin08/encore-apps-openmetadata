apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openmetadata
spec:
  interval: 1m
  timeout: 5m
  serviceAccountName: default-login-serviceaccount
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: openmetadata
      version: "1.12.1"
      sourceRef:
        kind: HelmRepository
        name: open-metadata
      interval: 5m
  values:
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
    openmetadata:
      config:
        pipelineServiceClientConfig:
          type: "k8s"
          k8s:
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
            rbac:
              enabled: false
    omjobOperator:
      enabled: false
