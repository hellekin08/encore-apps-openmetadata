apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openmetadata
spec:
  interval: 1m
  timeout: 5m
  serviceAccountName: default-login-serviceaccount
  dependsOn:
    - name: openmetadata-dependencies
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: openmetadata
      version: "1.12.1"
      sourceRef:
        kind: HelmRepository
        name: open-metadata
      interval: 5m
  values:
    startupProbe:
      failureThreshold: 15
      periodSeconds: 60
      timeoutSeconds: 5
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
    openmetadata:
      config:
        pipelineServiceClientConfig:
          type: "airflow"
          k8s:
            serviceAccountName: openmetadata-ingestion
            ingestionImage: docker.getcollate.io/openmetadata/ingestion-base:1.12.1
            backoffLimit: 3
            activeDeadlineSeconds: 7200
            ttlSecondsAfterFinished: 86400
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
              # does not work!
              #allowPrivilegeEscalation: false
              #capabilities:
              #drop: ["ALL"]
            rbac:
              enabled: false
    omjobOperator:
      enabled: false
