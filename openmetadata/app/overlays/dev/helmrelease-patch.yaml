apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openmetadata
spec:
  values:
    ingress:
      enabled: true
      className: nginx
      annotations:
        acme.cert-manager.io/dns01-edit-in-place: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      path: "/"
      pathType: "Prefix"
      hosts:
        - name: fluxed-openemetdata.encore-dev.enercity.cloud
          tls:
            enabled: true
            secretName: airflow-ingress-tls-certs
